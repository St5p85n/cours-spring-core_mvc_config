<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
  <h1>LISTE DES ETUDIANTS</h1>

    <table border="5">
        <thead>
            <tr>
                <th>ID</th>
                <th>NOM</th>
                <th>PRENOM</th>
                <th>AGE</th>
                <td>ACTION</td>
            </tr>
        </thead>
        <tbody>
            <tr th:each="et : ${etudiants}">
                <td th:text="${et.id}"></td>
                <td th:text="${et.nom}"></td>
                <td th:text="${et.prenom}"></td>
                <td th:text="${et.age}"></td>
                <td>
                    <a th:href="@{/etudiantview/{id}(id=${et.id})}">Sup</a>
                    <a th:href="@{/etudiantview/update/{id}(id=${et.id})}">Editer</a>

                </td>

            </tr>
        </tbody>

    </table>
</body>
</html>
